# Production compose file for the deploy target. Unlike docker-compose.yml (which builds
# images locally for dev), this pulls the images published by .github/workflows/ci-cd.yml.
# Copy this file + a real .env (see .env.example) to the server once; the CI/CD deploy job
# then just runs `docker compose -f docker-compose.prod.yml pull && up -d` on every push to main.
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-itinerary}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-itinerary}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrator:
    image: ghcr.io/fukunokaze/itinerary_be-migrator:latest
    environment:
      ConnectionStrings__DefaultConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB:-itinerary};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-password};SearchPath=itinerary
    depends_on:
      postgres:
        condition: service_healthy

  webapi:
    image: ghcr.io/fukunokaze/itinerary_be-webapi:latest
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB:-itinerary};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-password};SearchPath=itinerary
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set — see .env.example}
      Jwt__Issuer: ${JWT_ISSUER:-itinerary-be}
      Jwt__Audience: ${JWT_AUDIENCE:-itinerary-be-client}
      Google__ClientId: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID must be set — see .env.example}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET must be set — see .env.example}
      Google__RedirectUri: ${GOOGLE_REDIRECT_URI:-http://localhost:3000}
    ports:
      - "${WEBAPI_PORT:-8080}:8080"
    depends_on:
      migrator:
        condition: service_completed_successfully

volumes:
  postgres-data:
