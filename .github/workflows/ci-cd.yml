name: CI/CD

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  REGISTRY: ghcr.io

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore itinerary_be.slnx

      - name: Build
        run: dotnet build itinerary_be.slnx --no-restore -c Release

      - name: Test
        run: dotnet test itinerary_be.UnitTests --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results.trx"

  build-and-push:
    name: Build & push images
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: webapi
            dockerfile: itinerary_be.WebAPI/Dockerfile
          - image: migrator
            dockerfile: itinerary_be.Migration/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  deploy:
    name: Deploy to AKS
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    # Requires repo/environment secrets AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
    # from an App Registration with a federated credential trusting this repo/branch (OIDC,
    # no stored client secret) and "Azure Kubernetes Service Cluster User Role" on the cluster.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: trvl_pln_aks_group
          cluster-name: trvl_pln_aks

      - name: Apply base manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/webapi-service.yaml

      - name: Run DB migration
        run: |
          kubectl delete job itinerary-migrator -n itinerary --ignore-not-found
          sed "s#:latest#:${{ github.sha }}#" k8s/migrator-job.yaml | kubectl apply -f -
          kubectl wait --for=condition=complete job/itinerary-migrator -n itinerary --timeout=180s

      - name: Deploy webapi
        run: |
          sed "s#:latest#:${{ github.sha }}#" k8s/webapi-deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/itinerary-webapi -n itinerary --timeout=180s
